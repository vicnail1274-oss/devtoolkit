name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (npm package)
        working-directory: packages/devtoolkit-utils
        run: npm ci || npm install

      - name: Type check
        working-directory: packages/devtoolkit-utils
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: packages/devtoolkit-utils
        run: npx vitest run

      - name: Build
        working-directory: packages/devtoolkit-utils
        run: npx tsup
